<!DOCTYPE html>
<html>

<head>
    <title>Student Form & To-Do</title>
</head>

<body>

<h2>Student Form</h2>

<form action="/submit" method="POST">

<label>Name</label><br>
<input type="text" name="name" required><br><br>

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<button type="submit">Submit</button>

</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<hr>

<h2>To-Do Form</h2>

<form action="/submittodoitem" method="POST">

<label>Item Name</label><br>
<label>Item ID</label><br>
<input type="text" name="itemId" required><br><br>
<input type="text" name="itemName" required><br><br>

<label>Item Description</label><br>
<textarea name="itemDescription" rows="4" cols="40" required></textarea><br><br>

<button type="submit">Submit To-Do</button>

</form>

</body>

</html>
